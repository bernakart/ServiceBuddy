name: servicebuddy

services:
  redis:
    image: redis:7-alpine
    container_name: service_buddy_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: service_buddy_api
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./kilavuzlar.db:/app/kilavuzlar.db
      - ./modeller:/app/modeller
      - ./uploads:/app/uploads
    depends_on:
      - redis
    restart: unless-stopped

  streamlit:
    build: .
    container_name: service_buddy_streamlit
    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped