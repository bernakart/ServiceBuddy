name: ServiceBuddy CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu GitHub runner'a indir
        uses: actions/checkout@v4

      - name: SSH ayarlarını hazırla
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/servicebuddy_key
          chmod 600 ~/.ssh/servicebuddy_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: VM üzerinde proje klasörünü oluştur
        run: |
          ssh -i ~/.ssh/servicebuddy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "
            mkdir -p /opt/servicebuddy
          "

      - name: Kodları VM'ye gönder
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude 'modeller' \
            --exclude 'kilavuzlar.db' \
            -e "ssh -i ~/.ssh/servicebuddy_key" \
            ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/opt/servicebuddy/

      - name: VM üzerinde Docker Compose ile deploy et
        run: |
          ssh -i ~/.ssh/servicebuddy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "
            cd /opt/servicebuddy &&
            docker compose -p servicebuddy down &&
            docker compose -p servicebuddy up -d --build &&
            docker image prune -f
          "